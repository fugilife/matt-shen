<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root{--navy:#1a2744;--navy2:#0f1a30;--gold:#c9a84c;--white:#ffffff;--off:#dce4f0;--muted:#8fa8cc;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;background:var(--navy2);font-family:'Georgia','Times New Roman',serif;color:var(--white);-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;}
.card{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--navy);}
.header{padding:30px 28px 24px;border-bottom:0.5px solid rgba(201,168,76,0.18);}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.brand{display:flex;flex-direction:column;gap:3px;}
.brand-taiwan{font-size:10px;letter-spacing:0.26em;text-transform:uppercase;color:var(--gold);font-weight:normal;}
.brand-police{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);font-weight:normal;}
.flags-row{display:flex;align-items:center;flex-shrink:0;}
.flag-img{width:52px;height:35px;object-fit:cover;border-radius:2px;display:block;flex-shrink:0;}
.flags-divider{width:1px;height:22px;background:rgba(255,255,255,0.2);margin:0 7px;flex-shrink:0;}
.gold-rule{width:36px;height:1px;background:var(--gold);opacity:0.5;margin:0 0 16px;}
.name{font-size:30px;font-weight:normal;color:var(--white);letter-spacing:0.05em;margin-bottom:10px;line-height:1.1;}
.tagline{font-size:10.5px;letter-spacing:0.1em;color:var(--gold);opacity:0.8;font-style:italic;margin-bottom:16px;}
.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{font-size:8.5px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border-radius:2px;}
.chip-roc{background:rgba(0,0,149,0.22);color:#7ab0e8;border:0.5px solid rgba(0,0,149,0.45);}
.chip-ph{background:rgba(254,0,0,0.1);color:#e88888;border:0.5px solid rgba(254,0,0,0.28);}
.section{padding:20px 28px;border-bottom:0.5px solid rgba(255,255,255,0.06);}
.section-label{font-size:8px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);opacity:0.55;margin-bottom:12px;}
.contact-row{display:flex;align-items:center;gap:14px;padding:9px 0;border-bottom:0.5px solid rgba(255,255,255,0.04);text-decoration:none;color:inherit;-webkit-tap-highlight-color:transparent;transition:opacity 0.15s;}
.contact-row:last-child{border-bottom:none;}
.contact-row:active{opacity:0.65;}
.c-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.c-icon img{width:100%;height:100%;object-fit:cover;display:block;}
.i-phone{background:rgba(201,168,76,0.1);border:0.5px solid rgba(201,168,76,0.22);padding:8px;}
.i-phone img{object-fit:contain;}
.i-email{background:rgba(138,180,248,0.08);border:0.5px solid rgba(138,180,248,0.18);padding:8px;}
.i-email img{object-fit:contain;}
.c-text{flex:1;min-width:0;}
.c-label{font-size:8.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.c-value{font-size:13.5px;color:var(--off);letter-spacing:0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-arrow{color:var(--gold);opacity:0.4;font-size:18px;flex-shrink:0;}
.actions{padding:16px 28px;border-bottom:0.5px solid rgba(255,255,255,0.06);}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:3px;font-size:10.5px;letter-spacing:0.16em;text-transform:uppercase;font-family:'Georgia',serif;text-decoration:none;cursor:pointer;border:none;width:100%;-webkit-tap-highlight-color:transparent;transition:opacity 0.15s,transform 0.1s;}
.btn:active{opacity:0.8;transform:scale(0.985);}
.btn-gold{background:var(--gold);color:var(--navy2);font-weight:bold;}
.qr-section{padding:20px 28px 24px;}
.qr-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:14px;
}
.qr-item{display:flex;flex-direction:column;align-items:center;gap:7px;}
.qr-frame{
  width:100%;
  aspect-ratio:1/1;
  background:white;
  border-radius:8px;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.qr-frame img.qr-code{
  width:100%;height:100%;
  display:block;
  object-fit:fill;
  image-rendering:crisp-edges;
  image-rendering:pixelated;
}
.qr-app-icon{position:absolute;bottom:5px;right:5px;width:20px;height:20px;border-radius:5px;overflow:hidden;border:2px solid white;}
.qr-app-icon img{width:100%;height:100%;object-fit:cover;}
.qr-label{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);}
.footer{padding:18px 28px 32px;text-align:center;margin-top:auto;}
.footer-inner{display:inline-flex;align-items:center;justify-content:center;gap:10px;}
.footer-flag{width:32px;height:21px;object-fit:cover;border-radius:2px;opacity:0.55;}
.footer-text{font-size:9px;letter-spacing:0.18em;color:var(--gold);opacity:0.55;text-transform:uppercase;}
</style>
</head>
